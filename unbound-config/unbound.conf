# Unbound configuration for the pihole-unbound Docker setup.
#
# This file contains ONLY the settings that differ from Unbound's
# compiled-in defaults and are not already set by the Pi-hole guide config
# in unbound.conf.d/10-pi-hole.conf (which provides the listener on
# 127.0.0.1:5335 and is a verbatim copy of
# https://docs.pi-hole.net/guides/dns/unbound/).
#
# Everything else intentionally uses Unbound's defaults. To check any
# effective value:
#   docker exec unbound unbound-checkconf -o <option>

server:
    # Working directory and chroot jail. The container entrypoint creates
    # root.key and the unbound-control certificates here before startup.
    directory: "/etc/unbound"
    chroot: "/etc/unbound"

    # DNSSEC trust anchor, created and updated by the container entrypoint
    # (unbound-anchor). Without this, Unbound performs no DNSSEC validation.
    auto-trust-anchor-file: "/etc/unbound/root.key"

    ###########################################################################
    # CACHE
    ###########################################################################

    # Modest cache sizing for home networks (compiled defaults are 4m each).
    # Unbound recommends the rrset cache be about twice the msg cache.
    msg-cache-size: 16m
    rrset-cache-size: 32m

    # Keep cache entries at least 5 minutes, even if the domain owner set a
    # lower TTL. Fewer upstream queries at the cost of slightly stale data.
    cache-min-ttl: 300

    # Fetch DNSKEYs earlier in the validation process (lowers latency for a
    # little more CPU).
    prefetch-key: yes

    # Serve expired records (with TTL 0) immediately while re-resolving them
    # in the background.
    serve-expired: yes

    ###########################################################################
    # HARDENING
    ###########################################################################

    # Refuse id.server/hostname.bind and version.server/version.bind queries.
    hide-identity: yes
    hide-version: yes

    # Deny queries of type ANY with an empty response.
    deny-any: yes

    # Harden against algorithm downgrade when multiple algorithms are
    # advertised in the DS record.
    harden-algo-downgrade: yes

    # Ignore very large queries.
    harden-large-queries: yes

    # Rate-limit recursion (queries/second per zone) to blunt recursive
    # floods, e.g. random-subdomain attacks. Cached answers are not limited.
    ratelimit: 1000

    # Keep timed-out UDP ports open a little longer (in msec) so very late
    # upstream answers don't hit closed ports.
    delay-close: 10000

    # Defensively flush the caches if this many unwanted (potentially
    # poisoning) replies are seen.
    unwanted-reply-threshold: 10000

    # Addresses that may never appear in answers for public internet names
    # (DNS-rebinding protection). private-address is ADDITIVE across config
    # files: this entry complements the RFC1918/ULA/link-local list in
    # unbound.conf.d/10-pi-hole.conf with IPv4-mapped IPv6 addresses.
    private-address: ::ffff:0:0/96

    # Allow recursion from localhost and private LAN ranges. Unbound's
    # compiled default allows localhost only; kept so behavior is unchanged
    # if the listener is ever widened beyond 127.0.0.1.
    access-control: 127.0.0.1/32 allow
    access-control: 192.168.0.0/16 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow
    access-control: fc00::/7 allow
    access-control: ::1/128 allow

    ###########################################################################
    # WILDCARD INCLUDE
    ###########################################################################

    # Pi-hole guide config (10-pi-hole.conf) and local additions
    # (20-private-domains.conf). Loaded last: for single-value options,
    # the last occurrence wins.
    include: "/etc/unbound/unbound.conf.d/*.conf"
